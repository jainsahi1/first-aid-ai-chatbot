<!DOCTYPE html>
<html>
<head>
  <title>First Aid AI</title>
  <style>
    body { font-family: Arial; background: #eef2f7; }
    .chat { width: 420px; margin: auto; margin-top: 40px; background: white; border-radius: 10px; }
    .header { background: #28a745; color: white; padding: 15px; text-align: center; }
    .messages { height: 400px; overflow-y: auto; padding: 10px; }
    .msg { margin: 8px; }
    .user { text-align: right; color: blue; }
    .bot { text-align: left; }
    .input { display: flex; }
    input { flex: 1; padding: 10px; }
    button { padding: 10px; cursor: pointer; }
  </style>
</head>

<body>

<div class="chat">
  <div class="header">🩺 First Aid AI</div>

  <div class="messages" id="chatBox"></div>

  <div class="input">
    <input id="input" placeholder="Describe injury...">
    <button onclick="send()">Send</button>
    <button onclick="startVoice()">🎤</button>
  </div>

  <div style="padding:10px;">
    🌍 Language:
    <select id="lang">
      <option value="en">English</option>
      <option value="hi">Hindi</option>
    </select>

    <br><br>

    📷 <input type="file" onchange="uploadImage(event)">

    <br><br>

    🚨 <button onclick="emergency()">Emergency</button>
  </div>
</div>

<script>
async function send() {
  let text = input.value;
  let lang = document.getElementById("lang").value;
  let box = document.getElementById("chatBox");

  if (!text.trim()) return;

  box.innerHTML += `<div class="msg user">${text}</div>`;

  let res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: text, lang: lang})
  });

  let data = await res.json();
  box.innerHTML += `<div class="msg bot">${data.reply}</div>`;

  speak(data.reply);

  input.value = "";
  box.scrollTop = box.scrollHeight;
}

// Voice input
function startVoice() {
  let recognition = new webkitSpeechRecognition();
  recognition.onresult = function(event) {
    input.value = event.results[0][0].transcript;
    send();
  };
  recognition.start();
}

// Text to speech
function speak(text) {
  let speech = new SpeechSynthesisUtterance(text);
  window.speechSynthesis.speak(speech);
}

// Image upload
function uploadImage(event) {
  let file = event.target.files[0];
  let reader = new FileReader();

  reader.onload = async function() {
    let base64 = reader.result;

    let res = await fetch("/analyze-image", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({image: base64})
    });

    let data = await res.json();
    chatBox.innerHTML += `<div class="msg bot">${data.reply}</div>`;
  };

  reader.readAsDataURL(file);
}

// Emergency
function emergency() {
  alert("🚨 Call 108 immediately!");
}
</script>

</body>
</html>
